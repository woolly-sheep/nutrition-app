name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run seed:validate
      - run: npm run check:api-contract
      - run: npm run check:logging
      - run: npx tsc --noEmit
      - run: npm test
